services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: subscriptions_engine
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: ./bin/api
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - SERVICE=api

  worker:
    build: .
    command: ./bin/worker
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SERVICE=worker

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8080

volumes:
  postgres_data:
